    Publications:
      - title: The dependence of galaxy assembly bias on the selection criteria, number density, and redshift of galaxy samples
        authors:
          - Sergio García-Moreno
          - Jonás Chaves-Montero
        publisher: Astronomy and Astrophysics
        releaseDate: 2026-02-20
        url: https://www.aanda.org/articles/aa/abs/2026/02/aa55093-25/aa55093-25.html
        summary: One of the key factors influencing galaxy clustering in the nonlinear regime is galaxy assembly bias, which describes the dependence of galaxy clustering on halo properties beyond halo mass. We studied this effect by analyzing galaxy samples selected according to stellar mass, luminosity, and broadband colors from the IllustrisTNG hydrodynamical simulation. We find that galaxy assembly bias depends strongly on the selection criteria, number density, and redshift of the galaxy sample; this effect increases or decreases galaxy clustering by as much as 25%. Interestingly, no single secondary halo property fully captures the strength of galaxy assembly bias for any galaxy population. Therefore, empirical models predicting galaxy assembly bias as a function of a single halo property cannot reproduce predictions from hydrodynamical simulations. Finally, we investigated how galaxy assembly bias arises from the interplay between halo assembly bias (the dependence of halo clustering on properties other than halo mass) and occupancy variation (the correlation between galaxy occupation and secondary halo properties). We provide a fast analytical expression to predict the level of galaxy assembly bias induced by any halo property in simulated galaxy catalogs without the need for computationally expensive shuffling techniques.

